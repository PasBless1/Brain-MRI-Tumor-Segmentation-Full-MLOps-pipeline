version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db
              --default-artifact-root /mlflow/artifacts

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - CLASSIFIER_MODEL_URI=models:/brain_tumor_classifier/Production
      - SEGMENTOR_MODEL_URI=models:/brain_tumor_segmentor/Production
    depends_on:
      - mlflow
    volumes:
      - ./models:/app/models

  gradio:
    build: .
    ports:
      - "7860:7860"
    command: python src/serving/gradio_app.py
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  mlflow_data:
